<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Materiały dla kursantów</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f0f0f;
    color: #e0e0e0;
    min-height: 100vh;
    padding: 64px 24px;
  }

  .container {
    max-width: 760px;
    margin: 0 auto;
  }

  header {
    margin-bottom: 56px;
  }

  .eyebrow {
    color: #a78bfa;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  h1 {
    font-size: 32px;
    font-weight: 700;
    margin-bottom: 8px;
  }

  header p {
    color: #888;
    font-size: 15px;
  }

  .list {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  a.card {
    display: flex;
    align-items: center;
    gap: 16px;
    background: #1a1a1a;
    border: 1px solid #262626;
    border-radius: 12px;
    padding: 20px 24px;
    text-decoration: none;
    color: inherit;
    transition: border-color 0.15s ease, transform 0.15s ease;
  }

  a.card:hover {
    border-color: #7c3aed;
    transform: translateX(2px);
  }

  .card-icon {
    width: 36px;
    height: 36px;
    border-radius: 9px;
    background: #2a1f47;
    color: #a78bfa;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 13px;
    flex-shrink: 0;
  }

  .card-text h2 {
    font-size: 16px;
    font-weight: 600;
    text-transform: capitalize;
  }

  .card-arrow {
    margin-left: auto;
    color: #555;
    font-size: 18px;
  }

  .empty, .error {
    color: #555;
    font-size: 14px;
  }

  footer {
    margin-top: 56px;
    color: #555;
    font-size: 13px;
  }
</style>
</head>
<body>
  <div class="container">
    <header>
      <div class="eyebrow">Agenci AI</div>
      <h1>Materiały dla kursantów</h1>
      <p>Instrukcje krok po kroku do poszczególnych narzędzi i procesów.</p>
    </header>

    <div class="list" id="list">
      <p class="empty">Ładowanie...</p>
    </div>

    <footer>Lista uzupełnia się sama, gdy dodasz nowy folder z plikiem index.html.</footer>
  </div>

  <script>
    const REPO = 'AgenciAI/materialy-dla-kursantow';

    async function loadInstructions() {
      const list = document.getElementById('list');
      try {
        const res = await fetch(`https://api.github.com/repos/${REPO}/contents/`);
        const data = await res.json();

        const folders = data
          .filter(item => item.type === 'dir')
          .sort((a, b) => a.name.localeCompare(b.name, 'pl'));

        if (folders.length === 0) {
          list.innerHTML = '<p class="empty">Brak instrukcji. Dodaj folder z plikiem index.html.</p>';
          return;
        }

        list.innerHTML = folders.map((folder, i) => {
          const title = folder.name.replace(/-/g, ' ');
          const num = String(i + 1).padStart(2, '0');
          return `
            <a class="card" href="${folder.name}/">
              <div class="card-icon">${num}</div>
              <div class="card-text"><h2>${title}</h2></div>
              <div class="card-arrow">→</div>
            </a>`;
        }).join('');
      } catch (err) {
        list.innerHTML = '<p class="error">Nie udało się załadować listy instrukcji.</p>';
      }
    }

    loadInstructions();
  </script>
</body>
</html>
